<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台球世界 | 赛事中心</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header>
        <h1><i class="fas fa-trophy"></i> 赛事中心</h1>
        <p>精彩赛事 · 实时追踪 · 数据统计</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">首页</a></li>
            <li><a href="history.html">发展历史</a></li>
            <li><a href="rules.html">比赛规则</a></li>
            <li><a href="snooker.html">斯诺克</a></li>
            <li><a href="equipment.html">器材介绍</a></li>
            <li><a href="tables.html">球台规格</a></li>
            <li><a href="tournaments.html" class="active">赛事中心</a></li>
            <li><a href="players.html">著名球星</a></li>
            <li><a href="techniques.html">击球技巧</a></li>
            <li><a href="etiquette.html">台球礼仪</a></li>
            <li><a href="favorites.html">我的关注</a></li>
            <li><a href="contact.html">联系我们</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <div class="filter-section">
                <div class="filter-row">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="搜索赛事名称...">
                    </div>
                </div>
                <div class="filter-row">
                    <div class="filter-item">
                        <label for="typeFilter">项目类型</label>
                        <select id="typeFilter">
                            <option value="all">全部项目</option>
                            <option value="snooker">斯诺克</option>
                            <option value="9ball">花式九球</option>
                            <option value="8ball">中式八球</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label for="statusFilter">赛事状态</label>
                        <select id="statusFilter">
                            <option value="all">全部状态</option>
                            <option value="upcoming">即将开始</option>
                            <option value="ongoing">进行中</option>
                            <option value="completed">已结束</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label for="timeFilter">时间范围</label>
                        <select id="timeFilter">
                            <option value="all">全部时间</option>
                            <option value="thisMonth">本月</option>
                            <option value="nextMonth">下月</option>
                            <option value="thisYear">今年</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h2>赛事列表 <span id="resultCount" class="result-count"></span></h2>
            <div id="tournamentList" class="grid-container tournament-list">
            </div>
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fas fa-search"></i>
                <p>没有找到符合条件的赛事</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 台球世界 Billiards World. All Rights Reserved.</p>
        <p>Designed with <span style="color: var(--gold);">♥</span> by Antigravity</p>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/favorites.js"></script>
    <script src="js/tournaments.js"></script>
</body>

</html>
